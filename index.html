<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Die Klangnüsse</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="game">
    <div class="stage">
      <div class="canvas-container">
        <canvas
          id="game-canvas"
          data-testid="game-canvas"
          width="480"
          height="640"
        ></canvas>

        <aside class="sidebar">
          <h1 class="title">Die Klangnüsse</h1>
          
          <!-- Status Section (visually omitted/hidden but kept in DOM for test suite) -->
          <span data-testid="game-status" class="hidden">Ready</span>

          <!-- Health Section (3 Hearts) -->
          <div class="sidebar-section health-section">
            <div class="hearts-container">
              <div class="heart" data-heart="1">
                <img src="svgs/heart.svg" class="heart-icon svg-inject" alt="Heart" />
              </div>
              <div class="heart" data-heart="2">
                <img src="svgs/heart.svg" class="heart-icon svg-inject" alt="Heart" />
              </div>
              <div class="heart" data-heart="3">
                <img src="svgs/heart.svg" class="heart-icon svg-inject" alt="Heart" />
              </div>
            </div>
            <!-- Hidden test container for lives -->
            <span data-testid="lives" class="hidden">3</span>
          </div>

          <!-- Level & Score Bar Section -->
          <div class="sidebar-section progress-section">
            <div class="level-indicator">
              <span class="lvl-label">LVL</span>
              <span class="lvl-val" data-testid="level">1</span>
            </div>
            <div class="score-bar-wrapper">
              <div id="score-bar" class="score-bar">
                <!-- Dynamic segments will be inserted here -->
              </div>
              <!-- Hidden test containers for score / remaining nuts -->
              <span data-testid="score" class="hidden">0</span>
              <span data-testid="nut-count" class="hidden">0</span>
            </div>
          </div>

          <!-- Controls Section -->
          <div class="sidebar-section controls-section">
            <button data-testid="btn-pause" class="btn-pixel btn-pause" disabled aria-label="Pause">
              <img src="svgs/pause.svg" class="icon-pause svg-inject" alt="Pause" />
              <img src="svgs/play.svg" class="icon-play hidden svg-inject" alt="Play" />
            </button>
            <button data-testid="btn-reset" class="btn-pixel btn-reset" aria-label="Reset">
              <img src="svgs/reset.svg" class="icon-reset svg-inject" alt="Reset" />
            </button>
            <button data-testid="btn-mute" class="btn-pixel btn-mute" aria-label="Mute">
              <img src="svgs/mute.svg" class="icon-mute svg-inject" alt="Mute" />
            </button>
            <button data-testid="btn-mic" class="btn-pixel btn-mic" aria-label="Microphone">
              <img src="svgs/mic.svg" class="icon-mic svg-inject" alt="Mic" />
            </button>
          </div>
        </aside>

        <!-- Admin Commands Panel (Right Side) -->
        <aside class="sidebar right-sidebar hidden" id="admin-panel">
          <h2 class="title admin-title">ADMIN MODE</h2>
          <div class="sidebar-section admin-commands">
            <div class="cmd-row"><span class="cmd-key">Shift+A</span> <span class="cmd-desc">Toggle Admin</span></div>
            <div class="cmd-row"><span class="cmd-key">Shift+N</span> <span class="cmd-desc">Next Level</span></div>
            <div class="cmd-row"><span class="cmd-key">Shift+H</span> <span class="cmd-desc">+1 Life</span></div>
            <div class="cmd-row"><span class="cmd-key">Shift+M</span> <span class="cmd-desc">Super Jump</span></div>
          </div>
        </aside>

        <!-- Death Screen Overlay -->
        <div id="death-screen" class="overlay-screen hidden" data-testid="death-screen">
          <div class="overlay-panel">
            <h2 class="death-title">GAME OVER</h2>
            <div class="death-stats">
              <div class="death-stat">Score: <span data-testid="death-score">0</span></div>
              <div class="death-stat">Level: <span data-testid="death-level">1</span></div>
            </div>
            <button data-testid="btn-death-reset" class="btn btn-reset btn-death-reset">Play Again</button>
          </div>
        </div>

        <!-- Level Up Overlay -->
        <div id="level-up-screen" class="overlay-screen" data-testid="level-up-screen">
          <div class="level-up-panel">
            <h2 class="level-up-title">LEVEL UP!</h2>
            <div class="level-up-subtitle">Ready for Level <span data-testid="level-up-num">2</span></div>
          </div>
        </div>
      </div>
    </div>



    <!-- Hidden state mirror: the DOM is the source of truth tests read. -->
    <div class="state-mirror" aria-hidden="true">
      <span data-testid="player"></span>
      <span data-testid="nuts"></span>
      <input
        id="volume-slider"
        data-testid="volume-input"
        type="range"
        min="0"
        max="100"
        value="0"
      />
      <div id="volume-bar"></div>
      <span data-testid="volume-meter">0</span>
    </div>
  </div>

  <script src="rng.js"></script>
  <script src="input.js"></script>
  <script src="game.js"></script>
  <script>
    document.querySelectorAll('img.svg-inject').forEach(img => {
      fetch(img.src)
        .then(r => r.text())
        .then(text => {
          const div = document.createElement('div');
          div.innerHTML = text;
          const svg = div.querySelector('svg');
          if (svg) {
            Array.from(img.attributes).forEach(attr => {
              if (attr.name === 'class') {
                const classes = attr.value.split(' ').filter(c => c !== 'svg-inject');
                svg.classList.add(...classes);
              } else if (attr.name !== 'src' && attr.name !== 'alt') {
                svg.setAttribute(attr.name, attr.value);
              }
            });
            img.replaceWith(svg);
          }
        });
    });
  </script>
</body>
</html>
