<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Die Klangnüsse</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="game">
    <header class="hud">
      <h1 class="title">Die Klangnüsse</h1>
      <div class="hud-row">
        <div class="status-line">
          Status: <span data-testid="game-status">Ready</span>
        </div>
        <div class="stats">
          <span class="stat">Score: <span data-testid="score">0</span></span>
          <span class="stat">Lives: <span data-testid="lives">3</span></span>
          <span class="stat">Level: <span data-testid="level">1</span></span>
          <span class="stat">Left: <span data-testid="nut-count">0</span></span>
        </div>
      </div>
      <div class="hud-row controls-row">
        <button data-testid="btn-pause" class="btn btn-pause" disabled>Pause</button>
        <button data-testid="btn-reset" class="btn btn-reset">Reset</button>
        <button data-testid="btn-mute" class="btn btn-mute">🔊 Mute</button>
        <button data-testid="btn-mic" class="btn btn-mic">Mic</button>
      </div>
    </header>

    <div class="stage">
      <div class="canvas-container">
        <canvas
          id="game-canvas"
          data-testid="game-canvas"
          width="480"
          height="640"
        ></canvas>

        <!-- Death Screen Overlay -->
        <div id="death-screen" class="overlay-screen hidden" data-testid="death-screen">
          <div class="overlay-panel">
            <h2 class="death-title">GAME OVER</h2>
            <div class="death-stats">
              <div class="death-stat">Score: <span data-testid="death-score">0</span></div>
              <div class="death-stat">Level: <span data-testid="death-level">1</span></div>
            </div>
            <button data-testid="btn-death-reset" class="btn btn-reset btn-death-reset">Play Again</button>
          </div>
        </div>

        <!-- Level Up Overlay -->
        <div id="level-up-screen" class="overlay-screen" data-testid="level-up-screen">
          <div class="level-up-panel">
            <h2 class="level-up-title">LEVEL UP!</h2>
            <div class="level-up-subtitle">Ready for Level <span data-testid="level-up-num">2</span></div>
          </div>
        </div>
      </div>
    </div>



    <!-- Hidden state mirror: the DOM is the source of truth tests read. -->
    <div class="state-mirror" aria-hidden="true">
      <span data-testid="player"></span>
      <span data-testid="nuts"></span>
      <input
        id="volume-slider"
        data-testid="volume-input"
        type="range"
        min="0"
        max="100"
        value="0"
      />
      <div id="volume-bar"></div>
      <span data-testid="volume-meter">0</span>
    </div>
  </div>

  <script src="rng.js"></script>
  <script src="input.js"></script>
  <script src="game.js"></script>
</body>
</html>
