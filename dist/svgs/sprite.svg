<svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
  <symbol id="icon-heart" viewBox="-1 -1 11 10" shape-rendering="crispEdges">
    <g class="heart-shape">
      <rect x="2" y="0" width="2" height="1" />
      <rect x="5" y="0" width="2" height="1" />
      <rect x="1" y="1" width="7" height="1" />
      <rect x="0" y="2" width="9" height="2" />
      <rect x="1" y="4" width="7" height="1" />
      <rect x="2" y="5" width="5" height="1" />
      <rect x="3" y="6" width="3" height="1" />
      <rect x="4" y="7" width="1" height="1" />
    </g>
    <g class="heart-highlight">
      <rect x="2" y="1" width="1" height="1" />
      <rect x="1" y="2" width="1" height="1" />
    </g>
  </symbol>

  <symbol id="icon-mic" viewBox="0 0 16 16" shape-rendering="crispEdges">
    <rect x="6" y="2" width="4" height="6" fill="currentColor" />
    <rect x="7" y="1" width="2" height="1" fill="currentColor" />
    <rect x="7" y="8" width="2" height="1" fill="currentColor" />
    <rect x="6" y="4" width="4" height="1" fill="var(--panel-light)" />
    <rect x="6" y="6" width="4" height="1" fill="var(--panel-light)" />
    <rect x="3" y="6" width="2" height="5" fill="currentColor" />
    <rect x="11" y="6" width="2" height="5" fill="currentColor" />
    <rect x="4" y="10" width="8" height="2" fill="currentColor" />
    <rect x="7" y="12" width="2" height="2" fill="currentColor" />
    <rect x="5" y="14" width="6" height="1" fill="currentColor" />
  </symbol>

  <symbol id="icon-mute" viewBox="0 0 16 16" shape-rendering="crispEdges">
    <rect x="2" y="6" width="4" height="4" fill="currentColor" />
    <rect x="6" y="5" width="2" height="6" fill="currentColor" />
    <rect x="8" y="4" width="2" height="8" fill="currentColor" />
    <rect x="10" y="3" width="2" height="10" fill="currentColor" />
    <line class="mute-slash" x1="1" y1="15" x2="15" y2="1" stroke="var(--warn)" stroke-width="2" />
  </symbol>

  <symbol id="icon-pause" viewBox="0 0 16 16" shape-rendering="crispEdges">
    <rect x="4" y="3" width="3" height="10" fill="currentColor" />
    <rect x="9" y="3" width="3" height="10" fill="currentColor" />
  </symbol>

  <symbol id="icon-play" viewBox="0 0 16 16" shape-rendering="crispEdges">
    <rect x="4" y="2" width="2" height="12" fill="currentColor" />
    <rect x="6" y="3" width="2" height="10" fill="currentColor" />
    <rect x="8" y="4" width="2" height="8" fill="currentColor" />
    <rect x="10" y="5" width="2" height="6" fill="currentColor" />
    <rect x="12" y="6" width="2" height="4" fill="currentColor" />
    <rect x="14" y="7" width="2" height="2" fill="currentColor" />
  </symbol>

  <symbol id="icon-reset" viewBox="0 0 16 16" shape-rendering="crispEdges">
    <rect x="6" y="2" width="4" height="2" fill="currentColor" />
    <rect x="10" y="3" width="2" height="2" fill="currentColor" />
    <rect x="11" y="5" width="2" height="4" fill="currentColor" />
    <rect x="10" y="9" width="2" height="2" fill="currentColor" />
    <rect x="6" y="10" width="4" height="2" fill="currentColor" />
    <rect x="4" y="9" width="2" height="2" fill="currentColor" />
    <rect x="3" y="5" width="2" height="4" fill="currentColor" />
    <rect x="1" y="5" width="2" height="2" fill="currentColor" />
    <rect x="5" y="5" width="2" height="2" fill="currentColor" />
    <rect x="2" y="3" width="4" height="2" fill="currentColor" />
  </symbol>
</svg>
